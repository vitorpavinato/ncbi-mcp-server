version: '3.8'

services:
  ncbi-mcp-server:
    build: .
    container_name: ncbi-mcp-server
    restart: unless-stopped
    environment:
      # Required: Set your email in .env file
      - NCBI_EMAIL=${NCBI_EMAIL:-}
      # Optional: Set your API key in .env file for higher rate limits
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      # Optional: Redis URL (uses in-memory cache if not provided)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Optional: Logging level
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Cache directory for persistent storage
      - ./cache:/app/.cache
      # Logs directory (create if needed)
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - ncbi-network
    # For MCP stdio mode, typically no ports needed
    # ports:
    #   - "8000:8000"

  redis:
    image: redis:7-alpine
    container_name: ncbi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ncbi-network
    ports:
      - "6379:6379"

  # Optional: Redis monitoring
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    hostname: redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - ncbi-network

volumes:
  redis_data:

networks:
  ncbi-network:
    driver: bridge
